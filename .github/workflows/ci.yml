name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-and-smoke-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (pytest)
        run: pytest -v

      - name: Smoke-run the analysis pipeline
        run: python scripts/run_analysis.py

      - name: Upload generated charts/metrics as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-outputs
          path: |
            assets/images/
            reports/metrics.json
