[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 125
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E402"]  # notebooks/scripts insert repo root onto sys.path before importing superstore

[tool.ruff.lint.per-file-ignores]
"dashboard/app.py" = ["E402"]
"scripts/run_analysis.py" = ["E402"]
